<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SignalInk - Ultrasonic Chat</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>SignalInk</h1>
        <p>Chat with nearby devices using ultrasonic chirps!</p>
        <input type="text" id="messageInput" placeholder="Type a message">
        <button id="sendButton">Send</button>
        <div id="receivedMessages">Messages:<br></div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fft.js/0.0.4/fft.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
